---
- name: Deploy InfraVision Stack (Self-Hosted DCIM)
  hosts: localhost
  become: yes
  vars:
    app_dir: "/opt/infravision"
    repo_url: "https://github.com/davidsoncabista/InfraVision.git"

  vars_prompt:
    - name: hostname
      prompt: "🖥️ 1. Nome do Servidor (Hostname) [Enter para: InfraVision-Server]"
      default: "InfraVision-Server"
      private: no

    - name: template_storage
      prompt: "💾 2. Storage do template Ubuntu (Ex: local, Cluster-Ceph) [Enter para: local]"
      default: "local"
      private: no

    - name: container_storage
      prompt: "💾 3. Storage para o disco do LXC (Ex: local-lvm, VMs-Disck) [Enter para: local-lvm]"
      default: "local-lvm"
      private: no

    - name: template_name
      prompt: "📦 4. Nome exato do Template [Enter para manter ubuntu-24.04...]"
      default: "ubuntu-24.04-standard_24.04-2_amd64.tar.zst"
      private: no

    - name: ip_lxc
      prompt: "🌐 5. IP Fixo com máscara (Ex: 192.168.0.60/24)"
      default: "192.168.0.60/24"
      private: no

    - name: gateway
      prompt: "🌐 6. IP do Gateway da sua rede"
      default: "192.168.0.1"
      private: no

    - name: lxc_root_password
      prompt: "🔑 7. Digite a senha ROOT para o novo LXC"
      private: yes

    - name: db_password
      prompt: "🗄️ 8. Digite a senha para o banco PostgreSQL (infravision)"
      private: yes

    - name: admin_password
      prompt: "👤 9. Digite a senha inicial para o administrador web"
      private: yes

  tasks:
    - name: Gerar NEXTAUTH_SECRET automaticamente
      shell: openssl rand -hex 32
      register: secret_output

    - name: Salvar Secret na memória
      set_fact:
        nextauth_secret: "{{ secret_output.stdout }}"

    - name: Buscar próximo ID no cluster
      shell: "pvesh get /cluster/nextid"
      register: next_vmid_result

    - name: Definir VMID
      set_fact:
        vmid: "{{ next_vmid_result.stdout }}"

    - name: Limpar resíduo anterior
      shell: "pct stop {{ vmid }} --kill || true && pct destroy {{ vmid }} --purge || true"

    - name: Criar LXC no Proxmox (MAC Automático)
      shell: |
        pct create {{ vmid }} {{ template_storage }}:vztmpl/{{ template_name }} \
          --hostname {{ hostname }} \
          --storage {{ container_storage }} \
          --password '{{ lxc_root_password }}' \
          --net0 name=eth0,bridge=vmbr0,gw={{ gateway }},ip={{ ip_lxc }},firewall=1 \
          --features nesting=1,keyctl=1 \
          --memory 4096 \
          --swap 2048 \
          --cores 4 \
          --unprivileged 1 \
          --onboot 1 \
          --start 1

    - name: Injetar Nota no Proxmox
      shell: |
        pct set {{ vmid }} --description "# 🏢 InfraVision DCIM (LXC {{ vmid }})

        Sistema de Gestão de Data Center rodando via **Docker Compose**.

        ## 🌐 Configuração de Rede
        - **Hostname:** `{{ hostname }}`
        - **IP:** `{{ ip_lxc }}`
        - **Portas:** `3000` (Web), `3001` (API), `5432` (DB)

        ## 🛠️ Comandos de Gestão
        \`./deploy.sh\` (Na pasta /root) -> Atualiza código do Github e recria os containers.
        \`cd {{ app_dir }} && docker compose ps\` -> Ver status dos serviços."

    - name: Aguardar Rede subir (20s)
      pause:
        seconds: 20

    - name: Criar script de provisionamento blindado
      copy:
        dest: "/tmp/setup_infravision_{{ vmid }}.sh"
        mode: "0755"
        content: |
          #!/bin/bash
          export DEBIAN_FRONTEND=noninteractive
          apt-get update && apt-get install -y curl git gnupg lsb-release

          # Setup Docker
          mkdir -p /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg --yes
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu noble stable" > /etc/apt/sources.list.d/docker.list
          apt-get update && apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin

          # Setup do Repositório
          mkdir -p {{ app_dir }}
          cd {{ app_dir }}
          git clone {{ repo_url }} . || (git fetch --all && git reset --hard origin/main)

          # Auto-Seed do banco
          cat <<EOF > init.sql
          CREATE TABLE IF NOT EXISTS users (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            email VARCHAR(255) UNIQUE NOT NULL,
            password VARCHAR(255) NOT NULL,
            displayname VARCHAR(255),
            role VARCHAR(50) DEFAULT 'admin'
          );
          INSERT INTO users (email, password, displayname, role) 
          VALUES ('davidson.php@gmail.com', '{{ admin_password }}', 'Davidson', 'developer')
          ON CONFLICT (email) DO NOTHING;
          EOF

          # Criação do .env Automático
          cat <<EOF > .env
          POSTGRES_USER=infravision
          POSTGRES_PASSWORD={{ db_password }}
          POSTGRES_DB=infravisiondb
          PGRST_DB_URI=postgres://infravision:{{ db_password }}@db:5432/infravisiondb
          PGRST_DB_SCHEMA=public
          PGRST_DB_ANON_ROLE=infravision
          NEXT_PUBLIC_API_URL=http://$(echo {{ ip_lxc }} | cut -d'/' -f1):3001
          NEXTAUTH_URL=http://$(echo {{ ip_lxc }} | cut -d'/' -f1):3000
          NEXTAUTH_SECRET={{ nextauth_secret }}
          EOF

          # Criação do docker-compose.yml
          cat <<'EOF' > docker-compose.yml
          services:
            db:
              image: postgres:16-alpine
              container_name: infravision-db
              restart: always
              environment:
                POSTGRES_USER: ${POSTGRES_USER}
                POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                POSTGRES_DB: ${POSTGRES_DB}
              ports:
                - "5432:5432"
              volumes:
                - db_data:/var/lib/postgresql/data
                - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
              networks:
                - infra_net
              logging:
                driver: "json-file"
                options:
                  max-size: "50m"
                  max-file: "3"
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
                interval: 5s
                timeout: 5s
                retries: 5

            api:
              image: postgrest/postgrest
              container_name: infravision-api
              restart: always
              environment:
                PGRST_DB_URI: ${PGRST_DB_URI}
                PGRST_DB_SCHEMA: ${PGRST_DB_SCHEMA}
                PGRST_DB_ANON_ROLE: ${PGRST_DB_ANON_ROLE}
              ports:
                - "3001:3000"
              depends_on:
                db:
                  condition: service_healthy
              networks:
                - infra_net
              logging:
                driver: "json-file"
                options:
                  max-size: "50m"
                  max-file: "3"

            web:
              build: .
              container_name: infravision-web
              restart: always
              env_file: .env
              ports:
                - "3000:3000"
              depends_on:
                api:
                  condition: service_started
              networks:
                - infra_net
              logging:
                driver: "json-file"
                options:
                  max-size: "50m"
                  max-file: "3"

          volumes:
            db_data:

          networks:
            infra_net:
              driver: bridge
          EOF

          # Script deploy.sh em /root
          cat <<'EOF' > /root/deploy.sh
          #!/bin/bash
          GREEN='\033[0;32m'
          YELLOW='\033[1;33m'
          NC='\033[0m'
          APP_DIR="/opt/infravision"

          echo -e "${GREEN}=== DEPLOY INFRAVISION ===${NC}"
          cd $APP_DIR || exit 1

          echo -e "${YELLOW}Baixando código...${NC}"
          git fetch --all && git reset --hard origin/main && git pull origin main

          echo -e "${YELLOW}Compilando e subindo...${NC}"
          docker compose up -d --build web

          echo -e "${YELLOW}Limpando lixo...${NC}"
          docker image prune -f

          echo -e "${GREEN}Concluído!${NC}"
          EOF
          chmod +x /root/deploy.sh

          docker compose up -d --build

    - name: Enviar script para o LXC e Executar
      shell: |
        pct push {{ vmid }} /tmp/setup_infravision_{{ vmid }}.sh /root/setup.sh
        pct exec {{ vmid }} -- bash /root/setup.sh

    - name: Limpar script temporário
      file:
        path: "/tmp/setup_infravision_{{ vmid }}.sh"
        state: absent

    - name: Resultado Final
      debug:
        msg: |
          ✅ Deploy no ID {{ vmid }} concluído com SUCESSO! 🚀
          🌐 Acesse o sistema em: http://{{ ip_lxc | regex_replace('/.*', '') }}:3000
          🔐 NEXTAUTH_SECRET Gerado e salvo na máquina!